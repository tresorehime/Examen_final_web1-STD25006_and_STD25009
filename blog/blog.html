<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>T. Ramarozaka — Blog</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Source+Serif+4:wght@400;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../src/input.css" />
  <link rel="stylesheet" href="../src/output.css" />
  <link rel="stylesheet" href="blog.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

</head>
<body class="bg-white text-[#1a1a1a]">
  <header class="flex lg:justify-center lg:items-center lg:gap-80 bg-[#991b1b] navbar">


    <img src="../logo.png" alt="" class="hidden lg:block w-52">
    <nav class="hidden lg:block">
      <ul class="flex items-center gap-6 text-white text-md">
        <li><a href="../index.html" class="nav_link">HOME</a></li>
        <li><a href="../blog/blog.html" class="nav_link">BLOG</a></li>
        <li><a href="#" class="nav_link">COURSES</a></li>
        <li><a href="#" class="nav_link">TESTIMONIALS</a></li>
        <li><a href="../research/research.html" class="nav_link">RESEARCH</a></li>
      </ul>
    </nav>
    <div class="hidden lg:flex items-center gap-4">
      <input type="text" placeholder="search anything..." class="input_nav bg-[#991b1b] placeholder-gray-200 text-sm">
      <i class="fa-solid fa-basket-shopping text-2xl text-white"></i>
    </div>


    <div class="lg:hidden flex justify-between items-center px-5 w-full">
      <img src="../logo.png" alt="" class="w-36">
      <button id="burger-btn" class="text-white text-2xl">
        <i class="fa-solid fa-bars"></i>
      </button>
    </div>

  </header>

  <div id="mobile-menu" class="hidden fixed top-0 left-0 w-full bg-[#991b1b] z-50 flex-col px-5 py-4 gap-3">
    <div class="flex justify-between items-center mb-3">
      <img src="../logo.png" alt="" class="w-36">
      <button id="close-btn" class="text-white text-2xl">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>
    <div class="flex items-center gap-3 mb-3">
      <input type="text" placeholder="Search anything..." class="flex-1 bg-[#7f1d1d] placeholder-gray-300 text-white text-sm px-3 py-2 rounded">
      <i class="fa-solid fa-basket-shopping text-xl text-white"></i>
    </div>
    <ul class="flex flex-col gap-3 text-white text-sm">
      <li><a href="../index.html" class="nav_link">HOME</a></li>
      <li><a href="#" class="nav_link">BLOG</a></li>
      <li><a href="#" class="nav_link">COURSES</a></li>
      <li><a href="#" class="nav_link">TESTIMONIALS</a></li>
      <li><a href="../research/research.html" class="nav_link">RESEARCH</a></li>
    </ul>
  </div>

  <section class="text-center py-16 px-4 bg-[#fdf2f2]">
    <p id="hero-label" class="label-line text-xs font-medium tracking-widest uppercase mb-6 mt-4" style="color:#979592"></p>
    <h1 id="hero-title" class="font-display text-6xl font-bold mb-4"></h1>
    <p id="hero-sub" class="font-serif-body text-gray-500 text-base max-w-xs mx-auto"></p>
  </section>

  <div class="w-full px-10 lg:px-24 py-10 flex flex-col lg:flex-row gap-10">

    <main class="flex-1 min-w-0">
      <div id="post-list"></div>
      <div id="pagination" class="flex items-center justify-center gap-2 mt-10"></div>
    </main>

    <aside class="w-full lg:w-[360px] lg:flex-shrink-0 space-y-6">

      <div class="sidebar-block">
        <p class="sidebar-label mb-4">Archives</p>
        <ul id="archives-list" class="space-y-2 text-sm text-gray-600"></ul>
      </div>

      <div class="sidebar-block">
        <p class="sidebar-label mb-4">Newsletter</p>
        <p id="newsletter-sub" class="text-sm text-gray-500 mb-3"></p>
        <input type="email" placeholder="your@email.com" class="w-full border border-gray-300 px-3 py-2 text-sm mb-2 rounded-lg" />
        <button class="w-full bg-red-700 text-white text-sm font-medium tracking-widest uppercase py-2 rounded-lg">Subscribe</button>
      </div>

      <div class="sidebar-block">
        <p class="sidebar-label mb-4">On YouTube</p>
        <p id="youtube-sub" class="text-sm text-gray-500 mb-4"></p>
        <div id="youtube-list" class="space-y-4"></div>
        <a id="youtube-all" href="#" class="inline-block mt-4 text-sm text-red-700 font-medium tracking-wide uppercase underline underline-offset-2"></a>
      </div>

    </aside>
  </div>

  <section class="bg-red-700 text-white text-center py-20 px-6">
    <h2 id="cta-title" class="font-display text-4xl font-bold italic mb-3"></h2>
    <p id="cta-sub" class="text-red-200 mb-8 max-w-md mx-auto text-sm"></p>
    <div class="flex justify-center gap-4">
      <a id="cta-btn1" href="#" class="px-8 py-3 border border-white text-white text-sm font-medium tracking-widest uppercase rounded-full hover:bg-white hover:text-red-700 transition-colors duration-200"></a>
      <a id="cta-btn2" href="#" class="px-8 py-3 bg-white text-red-700 text-sm font-medium tracking-widest uppercase rounded-full hover:bg-red-100 transition-colors duration-200"></a>
    </div>
  </section>

  <script src="../tokimahery.data.js"></script>
  <script src="blog.js"></script>
  <script src="../navbar.js"></script>
</body>
</html>
